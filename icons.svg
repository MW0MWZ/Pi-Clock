<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pi-Clock public site icon sprite
  ================================
  Icons from Lucide (https://lucide.dev) — ISC Licensed.
  Mirrors the sprite shipped with the dashboard (src/dashboard/web/static/icons.svg)
  so the public website, manual and configurator share a single consistent
  visual language.

  Usage:
      <svg class="icon" aria-hidden="true">
          <use href="/icons.svg#icon-name"/>
      </svg>

  Manual pages live in /manual/ but still reference /icons.svg (absolute)
  so there's one cached copy site-wide. Presentation (stroke, fill, size)
  is set via CSS on the host .icon element — see manual.css and the inline
  styles on index.html / config-generator.html.
-->
