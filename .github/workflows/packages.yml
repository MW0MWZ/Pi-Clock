name: Build Pi-Clock Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (leave empty to use latest tag)'
        type: string
        default: ''
      rebuild_maps:
        description: 'Force rebuild maps package (re-download NASA imagery)'
        type: boolean
        default: false
      skip_os_build:
        description: 'Build packages only — do not trigger OS image build'
        type: boolean
        default: false

env:
  ALPINE_VERSION: "3.23"
  APK_KEY_NAME: "pi-clock-apk-signing.rsa"

jobs:
  build-packages:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
    # Serialise against other workflows that push to gh-pages
    # (build-os.yml, gfs-data.yml) so the final APKINDEX push
    # doesn't race with a concurrent GFS or OS-image update.
    concurrency:
      group: gh-pages-writer
      cancel-in-progress: false

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        path: source
        fetch-depth: 0
        fetch-tags: true

    - name: Checkout gh-pages
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: gh-pages
      continue-on-error: true

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VER="${{ inputs.version }}"
        elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VER="${GITHUB_REF#refs/tags/v}"
        else
          VER=$(git -C source tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 | sed 's/^v//')
          [ -z "$VER" ] && VER="0.0.0"
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"
        echo "Version: $VER"

    - name: Set up QEMU for multi-arch builds
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Write signing key to tmpfs
      run: |
        mkdir -p /dev/shm/apk-keys
        chmod 700 /dev/shm/apk-keys
        echo "${{ secrets.APK_PRIVATE_KEY }}" > /dev/shm/apk-keys/${APK_KEY_NAME}
        chmod 600 /dev/shm/apk-keys/${APK_KEY_NAME}
        openssl rsa -in /dev/shm/apk-keys/${APK_KEY_NAME} -check -noout
        echo "Signing key loaded"

    - name: Build maps and renderer APKs
      env:
        PKG_VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p apk-output

        TEMP_DIR=$(mktemp -d)
        cp source/.github/build-apk.sh "$TEMP_DIR/"
        cp -r source/packages "$TEMP_DIR/"
        cp -r source/renderer "$TEMP_DIR/"
        cp -r source/os "$TEMP_DIR/"

        docker run --rm --platform linux/arm/v6 \
          -v "$TEMP_DIR:/build:ro" \
          -v "/dev/shm/apk-keys:/keys:ro" \
          -v "$PWD/apk-output:/apk-output" \
          -v "$GITHUB_WORKSPACE/gh-pages:/gh-pages:ro" \
          -e PKG_VERSION="${PKG_VERSION}" \
          -e REBUILD_MAPS="${{ inputs.rebuild_maps && '1' || '0' }}" \
          -e SKIP_DASHBOARD=1 \
          "alpine:${ALPINE_VERSION}" \
          sh -c 'cp -r /build/* /tmp/build-src/ 2>/dev/null; sh /build/build-apk.sh'

        rm -rf "$TEMP_DIR"

    - name: Cross-compile and package dashboard
      env:
        PKG_VERSION: ${{ steps.version.outputs.version }}
      run: |
        cd $GITHUB_WORKSPACE/source/dashboard
        CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=6 go build \
          -ldflags "-s -w -X main.version=${PKG_VERSION}" \
          -o $GITHUB_WORKSPACE/dashboard-bin .
        cd $GITHUB_WORKSPACE

        TEMP_DIR=$(mktemp -d)
        cp -r source/packages/pi-clock-dashboard/* "$TEMP_DIR/"
        cp source/os/overlay/etc/init.d/pi-clock-dashboard "$TEMP_DIR/pi-clock-dashboard.initd"
        cp $GITHUB_WORKSPACE/dashboard-bin "$TEMP_DIR/pi-clock-dashboard"
        mkdir -p /dev/shm/dash-keys
        chmod 700 /dev/shm/dash-keys
        echo "${{ secrets.APK_PRIVATE_KEY }}" > "/dev/shm/dash-keys/${APK_KEY_NAME}"
        chmod 600 "/dev/shm/dash-keys/${APK_KEY_NAME}"
        openssl rsa -in "/dev/shm/dash-keys/${APK_KEY_NAME}" \
          -pubout -out "/dev/shm/dash-keys/${APK_KEY_NAME}.pub" 2>/dev/null
        cp "/dev/shm/dash-keys/${APK_KEY_NAME}" "$TEMP_DIR/"
        cp "/dev/shm/dash-keys/${APK_KEY_NAME}.pub" "$TEMP_DIR/"

        cat > "$TEMP_DIR/APKBUILD" << AEOF
        # Maintainer: MW0MWZ <andy@mw0mwz.co.uk>
        pkgname=pi-clock-dashboard
        pkgver=${PKG_VERSION}
        pkgrel=0
        pkgdesc="Pi-Clock web management dashboard"
        url="https://github.com/MW0MWZ/Pi-Clock"
        arch="armhf"
        license="GPL-2.0-only"
        depends="pi-clock-renderer"
        install="\$pkgname.post-install \$pkgname.post-upgrade"
        source=""
        options="!check !strip"

        package() {
            install -Dm755 "\$startdir/pi-clock-dashboard" \
                "\$pkgdir"/usr/bin/pi-clock-dashboard
            install -Dm755 "\$startdir/pi-clock-dashboard.initd" \
                "\$pkgdir"/etc/init.d/pi-clock-dashboard
        }
        AEOF

        docker run --rm --platform linux/arm/v6 \
          -v "$TEMP_DIR:/build:ro" \
          -v "$PWD/apk-output:/apk-output" \
          "alpine:${ALPINE_VERSION}" \
          sh -c '
            set -e
            apk add --no-cache abuild openssl sudo
            adduser -D builder 2>/dev/null || true
            addgroup builder abuild 2>/dev/null || true
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            cp -r /build/* /home/builder/
            mkdir -p /home/builder/.abuild /etc/apk/keys
            cp /home/builder/'"${APK_KEY_NAME}"' /home/builder/.abuild/'"${APK_KEY_NAME}"'
            openssl rsa -in /home/builder/.abuild/'"${APK_KEY_NAME}"' \
              -pubout -out /home/builder/.abuild/'"${APK_KEY_NAME}"'.pub 2>/dev/null
            cp /home/builder/.abuild/'"${APK_KEY_NAME}"'.pub /etc/apk/keys/
            echo "PACKAGER_PRIVKEY=\"/home/builder/.abuild/'"${APK_KEY_NAME}"'\"" \
              > /home/builder/.abuild/abuild.conf
            chown -R builder:builder /home/builder
            su - builder -c "cd /home/builder && abuild -r -d"
            find /home/builder/packages -name "*.apk" -exec cp {} /apk-output/ \;
          '

        rm -rf "$TEMP_DIR" /dev/shm/dash-keys

    - name: Verify APKs
      run: |
        echo "APK artifacts:"
        ls -lh apk-output/
        COUNT=$(ls apk-output/*.apk 2>/dev/null | wc -l)
        echo "Found $COUNT APK files"
        [ "$COUNT" -ge 2 ] || {
          echo "ERROR: Expected at least 2 APK files"
          exit 1
        }

    - name: Generate APKINDEX and deploy to gh-pages
      run: |
        ARMHF_DIR="gh-pages/v${ALPINE_VERSION}/pi-clock/armhf"
        NOARCH_DIR="gh-pages/v${ALPINE_VERSION}/pi-clock/noarch"
        mkdir -p "$ARMHF_DIR" "$NOARCH_DIR"

        # Deploy built APKs. Maps (noarch) go to both noarch/ and armhf/.
        HAS_MAPS=false
        for apk in apk-output/*.apk; do
          [ -f "$apk" ] || continue
          NAME=$(basename "$apk" | sed 's/-[0-9].*//')
          if echo "$apk" | grep -q "maps"; then
            HAS_MAPS=true
            rm -f "$NOARCH_DIR/${NAME}"-*.apk
            rm -f "$ARMHF_DIR/${NAME}"-*.apk
            cp "$apk" "$NOARCH_DIR/"
            cp "$apk" "$ARMHF_DIR/"
          else
            rm -f "$ARMHF_DIR/${NAME}"-*.apk
            cp "$apk" "$ARMHF_DIR/"
          fi
        done

        # If maps wasn't rebuilt, ensure armhf still has a copy
        if [ "$HAS_MAPS" = "false" ]; then
          cp "$NOARCH_DIR"/pi-clock-maps-*.apk "$ARMHF_DIR/" 2>/dev/null || true
        fi

        # Generate and sign APKINDEX
        docker run --rm --platform linux/arm/v6 \
          -v "/dev/shm/apk-keys:/keys:ro" \
          -v "$PWD/gh-pages:/gh-pages" \
          "alpine:${ALPINE_VERSION}" sh -c "
            set -e &&
            apk add --no-cache alpine-sdk &&
            mkdir -p /etc/apk/keys /root/.abuild &&
            openssl rsa -in /keys/${APK_KEY_NAME} -pubout \
              -out /etc/apk/keys/${APK_KEY_NAME}.pub 2>/dev/null &&
            echo 'PACKAGER_PRIVKEY=\"/keys/${APK_KEY_NAME}\"' > /root/.abuild/abuild.conf &&

            echo '--- armhf APKINDEX ---' &&
            cd /gh-pages/v${ALPINE_VERSION}/pi-clock/armhf &&
            rm -f APKINDEX.tar.gz APKINDEX.unsigned.tar.gz &&
            apk index -o APKINDEX.unsigned.tar.gz *.apk &&
            abuild-sign -k /keys/${APK_KEY_NAME} APKINDEX.unsigned.tar.gz &&
            mv APKINDEX.unsigned.tar.gz APKINDEX.tar.gz &&
            ls -lh . &&

            echo '--- noarch APKINDEX ---' &&
            cd /gh-pages/v${ALPINE_VERSION}/pi-clock/noarch &&
            rm -f APKINDEX.tar.gz APKINDEX.unsigned.tar.gz &&
            apk index -o APKINDEX.unsigned.tar.gz *.apk &&
            abuild-sign -k /keys/${APK_KEY_NAME} APKINDEX.unsigned.tar.gz &&
            mv APKINDEX.unsigned.tar.gz APKINDEX.tar.gz &&
            ls -lh .
          "

    - name: Push to gh-pages
      run: |
        cd gh-pages
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --cached --quiet && echo "No changes" && exit 0
        git commit -m "APK packages v${{ steps.version.outputs.version }}"
        git push

    - name: Wait for GitHub Pages to deploy
      if: startsWith(github.ref, 'refs/tags/v') && inputs.skip_os_build != true
      run: |
        echo "Waiting 60s for GitHub Pages to propagate APK repo..."
        sleep 60

    - name: Trigger OS image build
      if: startsWith(github.ref, 'refs/tags/v') && inputs.skip_os_build != true
      uses: peter-evans/repository-dispatch@v3
      with:
        event-type: packages-updated
